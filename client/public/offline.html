<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56a0" />
  <title>Offline — TSV Rentals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a56a0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header span {
      color: white;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .house-icon {
      width: 28px;
      height: 28px;
      fill: white;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      background: #e6f1fb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .icon-wrap svg {
      width: 44px;
      height: 44px;
      fill: #1a56a0;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a2e;
    }

    p {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }

    .btn {
      background: #1a56a0;
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 12px;
    }

    .btn:hover { background: #0c3d7a; }

    .btn-outline {
      background: transparent;
      color: #1a56a0;
      border: 2px solid #1a56a0;
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: inline-block;
      text-decoration: none;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .tip {
      margin-top: 40px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 16px 20px;
      max-width: 340px;
      text-align: left;
    }

    .tip h3 {
      font-size: 13px;
      font-weight: 600;
      color: #1a56a0;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tip p {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <svg class="house-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <span>TSV Rentals</span>
  </header>

  <main>
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 9l11-7 11 7v13H1V9zm2 1.5V20h18V10.5L12 4.5 3 10.5zM12 13a2 2 0 100 4 2 2 0 000-4z"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>No internet connection right now. Check your Wi-Fi or mobile data and try again.</p>

    <div class="actions">
      <button class="btn" onclick="window.location.reload()">Try again</button>
      <a class="btn-outline" href="/">Go home</a>
    </div>

    <div class="tip">
      <h3>💡 Tip</h3>
      <p>Install TSV Rentals on your home screen to load listings faster — even on a slow connection.</p>
    </div>
  </main>
</body>
</html>
